<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — منصة إدارة الأعمال</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); min-height: 100vh; }
  .glass { backdrop-filter: blur(16px); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); }
  .glow { box-shadow: 0 0 40px rgba(99,102,241,0.15); }
  input:focus { outline: none; }
  .floating-dot { position: absolute; border-radius: 50%; opacity: 0.07; background: #6366f1; animation: float 6s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
</style>
<script src="/config.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

<!-- Decorative blobs -->
<div class="floating-dot w-64 h-64 top-10 right-10" style="animation-delay:0s"></div>
<div class="floating-dot w-48 h-48 bottom-20 left-20" style="animation-delay:2s;background:#8b5cf6"></div>
<div class="floating-dot w-32 h-32 top-1/2 left-1/3" style="animation-delay:4s;background:#3b82f6"></div>

<div class="glass glow rounded-3xl p-8 w-full max-w-md relative z-10">

  <!-- Type Selector -->
  <div class="flex justify-center gap-3 mb-6">
    <button onclick="selectType('restaurant')" id="btnRestaurant"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium border transition
             bg-indigo-600/30 border-indigo-500/60 text-white">
      🍽️ مطعم
    </button>
    <button onclick="selectType('cafe')" id="btnCafe"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium border transition
             bg-white/5 border-white/15 text-slate-400">
      ☕ كافيه
    </button>
  </div>

  <!-- Logo & Welcome -->
  <div class="text-center mb-8">
    <div id="logoBox" class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-5 shadow-lg shadow-indigo-500/30">
      <span id="logoEmoji" class="text-4xl">🍽️</span>
    </div>
    <h1 class="text-white text-2xl font-bold mb-1">أهلاً وسهلاً بك 👋</h1>
    <p id="subTitle" class="text-indigo-300 text-sm font-medium">منصة إدارة مطعمك الذكية</p>
    <p class="text-slate-400 text-xs mt-1">سجّل دخولك للوصول إلى لوحة التحكم</p>
  </div>

  <!-- Form -->
  <form id="loginForm" class="space-y-4">
    <div>
      <label class="block text-slate-300 text-sm mb-2">📧 البريد الإلكتروني</label>
      <input id="email" type="email"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-indigo-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="example@restaurant.com" required>
    </div>
    <div>
      <label class="block text-slate-300 text-sm mb-2">🔒 كلمة المرور</label>
      <input id="restaurant_login_password_new"
        name="restaurant_login_password_new"
        type="password"
        autocomplete="new-password"
        data-lpignore="true"
        data-1p-ignore="true"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-indigo-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="••••••••" required>
    </div>

    <!-- Forgot password -->
    <div class="text-left">
      <a href="/reset-password" class="text-indigo-400 hover:text-indigo-300 text-xs transition">نسيت كلمة المرور؟</a>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-500/15 border border-red-500/30 text-red-300 rounded-xl px-4 py-3 text-sm"></div>

    <!-- Submit -->
    <button type="submit" id="submitBtn"
      class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500
             text-white font-semibold rounded-xl py-3 transition flex items-center justify-center gap-2 mt-6
             shadow-lg shadow-indigo-500/25">
      <span id="btnText">تسجيل الدخول</span>
      <span id="btnSpinner" class="hidden">
        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </span>
    </button>
  </form>

  <!-- Register link -->
  <div class="mt-5 text-center">
    <p class="text-slate-500 text-sm">
      ليس لديك حساب؟
      <a href="/register" class="text-indigo-400 hover:text-indigo-300 transition font-medium">إنشاء حساب مجاني</a>
    </p>
  </div>

  <!-- Support contact -->
  <div class="mt-4 border-t border-white/10 pt-4 text-center space-y-2">
    <p class="text-slate-500 text-xs">هل تحتاج مساعدة؟</p>
    <a id="supportLink" href="https://wa.me/9647710005018" target="_blank"
      class="inline-flex items-center gap-2 bg-green-500/10 border border-green-500/20 text-green-400 text-xs px-4 py-2 rounded-xl hover:bg-green-500/20 transition">
      <span>💬</span> تواصل مع الدعم الفني
    </a>
  </div>
</div>

<script>
  function selectType(type) {
    const isRestaurant = type === 'restaurant';
    document.getElementById('btnRestaurant').className =
      'flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium border transition ' +
      (isRestaurant ? 'bg-indigo-600/30 border-indigo-500/60 text-white' : 'bg-white/5 border-white/15 text-slate-400');
    document.getElementById('btnCafe').className =
      'flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium border transition ' +
      (!isRestaurant ? 'bg-amber-600/30 border-amber-500/60 text-white' : 'bg-white/5 border-white/15 text-slate-400');
    document.getElementById('logoEmoji').textContent = isRestaurant ? '🍽️' : '☕';
    document.getElementById('logoBox').className =
      'inline-flex items-center justify-center w-20 h-20 rounded-2xl mb-5 shadow-lg bg-gradient-to-br ' +
      (isRestaurant ? 'from-indigo-500 to-purple-600 shadow-indigo-500/30' : 'from-amber-500 to-orange-600 shadow-amber-500/30');
    document.getElementById('subTitle').textContent = isRestaurant
      ? 'منصة إدارة مطعمك الذكية'
      : 'منصة إدارة كافيهك الذكية';
  }

  // Load support phone dynamically
  fetch((window.API_BASE || '') + '/api/platform/config')
    .then(r => r.json()).then(cfg => {
      if (cfg.support_phone) {
        document.getElementById('supportLink').href = 'https://wa.me/' + cfg.support_phone;
      }
    }).catch(() => {});

  if (localStorage.getItem('token')) {
    window.location.href = '/app';
  }

  // Clear any browser/password-manager autofill on initial load.
  // Guard prevents clearing after the user has deliberately started typing.
  (function clearAutofill() {
    const pwId = 'restaurant_login_password_new';
    let userTyped = false;
    document.getElementById(pwId).addEventListener('input', function() { userTyped = true; }, { once: true });
    [100, 500].forEach(ms => setTimeout(() => {
      if (!userTyped) document.getElementById(pwId).value = '';
    }, ms));
  })();

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error');
    btn.disabled = true;
    document.getElementById('btnText').textContent = 'جارٍ التحقق...';
    document.getElementById('btnSpinner').classList.remove('hidden');
    errEl.classList.add('hidden');

    try {
      const res = await fetch((window.API_BASE || '') + '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('restaurant_login_password_new').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'فشل تسجيل الدخول');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/app';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      document.getElementById('btnText').textContent = 'تسجيل الدخول';
      document.getElementById('btnSpinner').classList.add('hidden');
    }
  });
</script>
</body>
</html>
