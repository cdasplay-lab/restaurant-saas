<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب — منصة إدارة المطاعم</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(135deg, #0f172a 0%, #0f2a1e 100%); min-height: 100vh; }
  .card { backdrop-filter: blur(10px); }
  input:focus, select:focus { outline: none; }
  .plan-card { cursor: pointer; transition: all 0.2s; }
  .plan-card.selected { border-color: #22c55e; background: rgba(34,197,94,0.1); }
  .plan-card:not(.selected) { border-color: rgba(255,255,255,0.1); }
  .plan-card:not(.selected):hover { border-color: rgba(255,255,255,0.25); }
</style>
<script src="/config.js"></script>
</head>
<body class="flex items-center justify-center p-4 py-10">

<div class="card bg-white/5 border border-green-500/20 rounded-2xl p-8 w-full max-w-lg shadow-2xl">

  <!-- Header -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-green-700 rounded-2xl mb-4 shadow-lg">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
    </div>
    <h1 class="text-white text-2xl font-bold">ابدأ الآن مجاناً</h1>
    <p class="text-slate-400 text-sm mt-1">أنشئ حساب مطعمك في ثوانٍ</p>
  </div>

  <!-- Form -->
  <form id="registerForm" class="space-y-4">

    <!-- Restaurant name -->
    <div>
      <label class="block text-slate-300 text-sm mb-2">اسم المطعم <span class="text-red-400">*</span></label>
      <input id="restaurantName" type="text" maxlength="80"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-green-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="مطعم النخبة" required>
    </div>

    <!-- Owner name -->
    <div>
      <label class="block text-slate-300 text-sm mb-2">اسمك <span class="text-red-400">*</span></label>
      <input id="ownerName" type="text" maxlength="60"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-green-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="أحمد محمد" required>
    </div>

    <!-- Email -->
    <div>
      <label class="block text-slate-300 text-sm mb-2">البريد الإلكتروني <span class="text-red-400">*</span></label>
      <input id="email" type="email"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-green-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="ahmed@restaurant.com" required>
    </div>

    <!-- Password -->
    <div>
      <label class="block text-slate-300 text-sm mb-2">كلمة المرور <span class="text-red-400">*</span></label>
      <input id="password" type="password" minlength="6"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-green-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="6 أحرف على الأقل" required>
    </div>

    <!-- Plan selection -->
    <div>
      <label class="block text-slate-300 text-sm mb-3">اختر الخطة</label>
      <div class="grid grid-cols-2 gap-2">

        <div class="plan-card selected border rounded-xl p-3 text-center" data-plan="trial" onclick="selectPlan('trial')">
          <div class="text-green-400 font-bold text-sm">تجريبي</div>
          <div class="text-white font-bold text-lg mt-0.5">مجاني</div>
          <div class="text-slate-400 text-xs mt-1">14 يوم • 10 منتجات</div>
        </div>

        <div class="plan-card border rounded-xl p-3 text-center" data-plan="starter" onclick="selectPlan('starter')">
          <div class="text-blue-400 font-bold text-sm">ستارتر</div>
          <div class="text-white font-bold text-lg mt-0.5">99 ر.س</div>
          <div class="text-slate-400 text-xs mt-1">شهرياً • 50 منتج</div>
        </div>

        <div class="plan-card border rounded-xl p-3 text-center" data-plan="professional" onclick="selectPlan('professional')">
          <div class="text-purple-400 font-bold text-sm">احترافي</div>
          <div class="text-white font-bold text-lg mt-0.5">299 ر.س</div>
          <div class="text-slate-400 text-xs mt-1">شهرياً • 200 منتج</div>
        </div>

        <div class="plan-card border rounded-xl p-3 text-center" data-plan="enterprise" onclick="selectPlan('enterprise')">
          <div class="text-orange-400 font-bold text-sm">مؤسسي</div>
          <div class="text-white font-bold text-lg mt-0.5">799 ر.س</div>
          <div class="text-slate-400 text-xs mt-1">شهرياً • غير محدود</div>
        </div>

      </div>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-500/20 border border-red-500/40 text-red-300 rounded-xl px-4 py-3 text-sm"></div>

    <!-- Submit -->
    <button type="submit" id="submitBtn"
      class="w-full bg-green-700 hover:bg-green-600 text-white font-semibold rounded-xl py-3
             transition flex items-center justify-center gap-2 mt-2">
      <span id="btnText">إنشاء الحساب</span>
      <span id="btnSpinner" class="hidden">
        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </span>
    </button>

  </form>

  <!-- Login link -->
  <div class="mt-6 text-center">
    <p class="text-slate-500 text-sm">
      لديك حساب بالفعل؟
      <a href="/" class="text-green-400 hover:text-green-300 transition font-medium">تسجيل الدخول</a>
    </p>
  </div>

</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('token')) {
    window.location.href = '/app';
  }

  let selectedPlan = 'trial';

  function selectPlan(plan) {
    selectedPlan = plan;
    document.querySelectorAll('.plan-card').forEach(el => {
      el.classList.toggle('selected', el.dataset.plan === plan);
    });
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error');
    errEl.classList.add('hidden');
    btn.disabled = true;
    document.getElementById('btnText').textContent = 'جارٍ الإنشاء...';
    document.getElementById('btnSpinner').classList.remove('hidden');

    try {
      const res = await fetch((window.API_BASE || '') + '/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          restaurant_name: document.getElementById('restaurantName').value.trim(),
          owner_name: document.getElementById('ownerName').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
          plan: selectedPlan,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'فشل إنشاء الحساب');

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/app';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      document.getElementById('btnText').textContent = 'إنشاء الحساب';
      document.getElementById('btnSpinner').classList.add('hidden');
    }
  });
</script>
</body>
</html>
