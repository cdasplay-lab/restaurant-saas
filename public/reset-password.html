<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعادة كلمة المرور — منصة إدارة الأعمال</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); min-height: 100vh; }
  .glass { backdrop-filter: blur(16px); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); }
  input:focus { outline: none; }
</style>
<script src="/config.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="glass rounded-3xl p-8 w-full max-w-md">

  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-4 shadow-lg">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
      </svg>
    </div>
    <h1 id="pageTitle" class="text-white text-2xl font-bold">استعادة كلمة المرور</h1>
    <p id="pageSubtitle" class="text-indigo-300 text-sm mt-1">أدخل بريدك الإلكتروني لإرسال رابط الاستعادة</p>
  </div>

  <!-- Forgot form -->
  <form id="forgotForm" class="space-y-4">
    <div>
      <label class="block text-slate-300 text-sm mb-2">📧 البريد الإلكتروني</label>
      <input id="email" type="email"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-indigo-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="example@restaurant.com" required>
    </div>
    <div id="forgotError" class="hidden bg-red-500/15 border border-red-500/30 text-red-300 rounded-xl px-4 py-3 text-sm"></div>
    <div id="forgotSuccess" class="hidden bg-green-500/15 border border-green-500/30 text-green-300 rounded-xl px-4 py-3 text-sm"></div>
    <button type="submit" id="forgotBtn"
      class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500
             text-white font-semibold rounded-xl py-3 transition flex items-center justify-center gap-2">
      <span id="forgotBtnText">إرسال رابط الاستعادة</span>
      <span id="forgotSpinner" class="hidden">
        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </span>
    </button>
  </form>

  <!-- Reset form (shown after token is detected) -->
  <form id="resetForm" class="hidden space-y-4">
    <div>
      <label class="block text-slate-300 text-sm mb-2">🔒 كلمة المرور الجديدة</label>
      <input id="newPassword" type="password" minlength="6"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-indigo-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="6 أحرف على الأقل" required>
    </div>
    <div>
      <label class="block text-slate-300 text-sm mb-2">🔒 تأكيد كلمة المرور</label>
      <input id="confirmPassword" type="password" minlength="6"
        class="w-full bg-white/10 border border-white/20 text-white rounded-xl px-4 py-3 text-sm
               focus:border-indigo-500 focus:bg-white/15 transition placeholder-slate-500"
        placeholder="أعد كتابة كلمة المرور" required>
    </div>
    <div id="resetError" class="hidden bg-red-500/15 border border-red-500/30 text-red-300 rounded-xl px-4 py-3 text-sm"></div>
    <button type="submit" id="resetBtn"
      class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500
             text-white font-semibold rounded-xl py-3 transition flex items-center justify-center gap-2">
      <span id="resetBtnText">تغيير كلمة المرور</span>
      <span id="resetSpinner" class="hidden">
        <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </span>
    </button>
  </form>

  <div class="mt-6 text-center">
    <a href="/login" class="text-indigo-400 hover:text-indigo-300 text-sm transition">← العودة لتسجيل الدخول</a>
  </div>

</div>

<script>
  const token = new URLSearchParams(location.search).get('token');

  if (token) {
    document.getElementById('forgotForm').classList.add('hidden');
    document.getElementById('resetForm').classList.remove('hidden');
    document.getElementById('pageTitle').textContent = 'تعيين كلمة مرور جديدة';
    document.getElementById('pageSubtitle').textContent = 'أدخل كلمة مرورك الجديدة';
  }

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('forgotBtn');
    const errEl = document.getElementById('forgotError');
    const sucEl = document.getElementById('forgotSuccess');
    errEl.classList.add('hidden');
    sucEl.classList.add('hidden');
    btn.disabled = true;
    document.getElementById('forgotBtnText').textContent = 'جارٍ الإرسال...';
    document.getElementById('forgotSpinner').classList.remove('hidden');

    try {
      const res = await fetch((window.API_BASE || '') + '/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'حدث خطأ');
      sucEl.textContent = data.message;
      sucEl.classList.remove('hidden');
      document.getElementById('forgotForm').querySelector('button').classList.add('hidden');
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      document.getElementById('forgotBtnText').textContent = 'إرسال رابط الاستعادة';
      document.getElementById('forgotSpinner').classList.add('hidden');
    }
  });

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    const errEl = document.getElementById('resetError');
    errEl.classList.add('hidden');

    if (pass !== confirm) {
      errEl.textContent = 'كلمتا المرور غير متطابقتين';
      errEl.classList.remove('hidden');
      return;
    }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    document.getElementById('resetBtnText').textContent = 'جارٍ الحفظ...';
    document.getElementById('resetSpinner').classList.remove('hidden');

    try {
      const res = await fetch((window.API_BASE || '') + '/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pass }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'حدث خطأ');
      document.getElementById('resetForm').innerHTML =
        `<div class="bg-green-500/15 border border-green-500/30 text-green-300 rounded-xl px-4 py-4 text-sm text-center">
          ✅ ${data.message}<br>
          <a href="/login" class="text-indigo-400 hover:text-indigo-300 mt-3 inline-block font-medium">تسجيل الدخول الآن ←</a>
        </div>`;
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
      btn.disabled = false;
      document.getElementById('resetBtnText').textContent = 'تغيير كلمة المرور';
      document.getElementById('resetSpinner').classList.add('hidden');
    }
  });
</script>
</body>
</html>
