services:
  - type: web
    name: restaurant-saas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      # ── Security ────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true          # Auto-generated by Render (32+ chars)
      - key: SESSION_HOURS
        value: "24"

      # ── Server ──────────────────────────────────────────────────────
      # Set BASE_URL to your actual Render URL after first deploy, e.g.:
      #   https://restaurant-saas.onrender.com
      - key: BASE_URL
        sync: false
      # Set to your frontend domain(s), e.g.:
      #   https://yourapp.netlify.app
      - key: ALLOWED_ORIGINS
        sync: false

      # ── Database ────────────────────────────────────────────────────
      # SQLite default path (ephemeral on Render free tier — use PostgreSQL for production)
      - key: DB_PATH
        value: /opt/render/project/src/restaurant.db
      # Uncomment + add PostgreSQL add-on for persistent storage:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: restaurant-db
      #     property: connectionString

      # ── OpenAI ──────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

      # ── Supabase Storage ────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false                  # ⚠️ Backend only — never expose to frontend
      - key: SUPABASE_STORAGE_BUCKET_MENUS
        value: menus
      - key: SUPABASE_STORAGE_BUCKET_PRODUCTS
        value: products

# Uncomment to add a managed PostgreSQL database:
# databases:
#   - name: restaurant-db
#     databaseName: restaurant
#     user: restaurant
