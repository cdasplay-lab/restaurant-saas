[build]
  # يولّد config.js من env vars ثم ينشر محتوى /public
  command = "bash scripts/build_config.sh"
  publish = "public"

# ── المتغيرات المطلوبة في Netlify Dashboard → Environment variables ──────────
# API_BASE             = "https://api.yourapp.railway.app"
# SUPABASE_URL         = "https://xxxx.supabase.co"
# SUPABASE_ANON_KEY    = "eyJ..."           ← anon/public key فقط
#
# ⚠️  لا تضع هنا أبداً:
#   SUPABASE_SERVICE_ROLE_KEY  ← يبقى في backend (Railway/Render) فقط
#   JWT_SECRET / OPENAI_API_KEY ← backend only

# ── SPA Routing ───────────────────────────────────────────────────────────────
[[redirects]]
  from = "/super/login"
  to   = "/super_login.html"
  status = 200

[[redirects]]
  from = "/super"
  to   = "/super.html"
  status = 200

[[redirects]]
  from = "/login"
  to   = "/login.html"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/app.html"
  status = 200

# ── Security Headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/config.js"
  [headers.values]
    # config.js يحتوي API endpoints — لا تخزينه في cache أبداً
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
